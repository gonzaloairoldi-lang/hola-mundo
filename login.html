<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card {
      width: 100%;
      max-width: 400px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 48px 40px;
    }
    .back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      font-size: 13px;
      margin-bottom: 32px;
      transition: color 0.2s;
    }
    .back:hover { color: rgba(255,255,255,0.8); }
    .logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700;
      margin-bottom: 24px;
    }
    h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.5px; color: #fff; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: rgba(255,255,255,0.4); margin-bottom: 32px; }
    .field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    label { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.6); }
    input {
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    input:focus { border-color: rgba(124,58,237,0.6); }
    button {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      border: none; border-radius: 10px;
      color: #fff; font-size: 15px; font-weight: 500;
      cursor: pointer; margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #result {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      display: none;
      transition: all 0.3s;
    }
    #result.ok {
      display: block;
      background: rgba(16, 185, 129, 0.12);
      border: 1px solid rgba(16, 185, 129, 0.3);
      color: #34d399;
    }
    #result.error {
      display: block;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
    }
  </style>
</head>
<body>
  <div class="card">
    <a class="back" href="/">← Volver</a>
    <div class="logo">A</div>
    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresá tus credenciales para continuar</p>

    <div class="field">
      <label for="username">Usuario</label>
      <input id="username" type="text" placeholder="Tu usuario" autocomplete="off" />
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input id="password" type="password" placeholder="••••••••" />
    </div>

    <button id="loginBtn" onclick="doLogin()">Ingresar</button>
    <div id="result"></div>
  </div>

  <script>
    // Enter key support
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const result = document.getElementById('result');

      if (!username || !password) {
        showResult('error', 'Completá usuario y contraseña.');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Verificando...';
      result.className = '';
      result.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (res.ok) {
          showResult('ok', '✓ Login correcto. Bienvenido, ' + data.username + '.');
        } else {
          showResult('error', '✗ ' + (data.message || 'Credenciales inválidas.'));
        }
      } catch (err) {
        showResult('error', '✗ Error de conexión. Intentá de nuevo.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }

    function showResult(type, msg) {
      const result = document.getElementById('result');
      result.className = type;
      result.textContent = msg;
      result.style.display = 'block';
    }
  </script>
</body>
</html>
