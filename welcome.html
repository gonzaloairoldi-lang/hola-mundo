<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bienvenido</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { min-height:100vh; display:flex; align-items:center; justify-content:center;
           background:#0a0a0f; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; }
    .card { text-align:center; padding:60px 80px; background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08); border-radius:24px; }
    .icon { font-size:48px; margin-bottom:24px; }
    h1 { font-size:32px; font-weight:600; color:#fff; margin-bottom:8px; letter-spacing:-0.5px; }
    p { color:rgba(255,255,255,0.4); font-size:15px; margin-bottom:32px; }
    button { padding:12px 28px; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12);
             border-radius:10px; color:#fff; font-size:14px; cursor:pointer; transition:background 0.2s; }
    button:hover { background:rgba(255,255,255,0.14); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Login correcto</h1>
    <p id="msg">Bienvenido.</p>
    <button onclick="logout()">Cerrar sesión</button>
  </div>
  <script>
    fetch('/api/me').then(r => r.json()).then(d => {
      if (!d.username) { location.href='/login.html'; return; }
      document.getElementById('msg').textContent = `Bienvenido, ${d.username}.`;
    });
    async function logout() {
      await fetch('/api/logout', { method:'POST' });
      location.href = '/login.html';
    }
  </script>
</body>
</html>
